apiVersion: v1
kind: Service
metadata:
  name: {{ include "mqtt-device-controller.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mqtt-device-controller.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "mqtt-device-controller.selectorLabels" . | nindent 4 }}
  ports:
    - name: https-api
      port: {{ .Values.service.apiPort }}
      targetPort: https-api
      protocol: TCP
    - name: metrics
      port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
